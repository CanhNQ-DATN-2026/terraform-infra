# .gitlab-ci.yml — Terraform CI/CD pipeline
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   AWS_ROLE_ARN  — IAM role to assume via OIDC (e.g. arn:aws:iam::ACCOUNT:role/bookgate-terraform-role)
#   AWS_REGION    — AWS region (e.g. us-east-1)
#
# All Terraform variables are sourced from terraform.tfvars (committed, no secrets).
# RDS password is managed by AWS Secrets Manager — no password var needed.

stages:
  - validate
  - plan
  - apply

default:
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  tags:
    - terraform-runner

# ── OIDC auth helper ────────────────────────────────────────────────────────
.aws_oidc: &aws_oidc
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - apk add --no-cache aws-cli jq > /dev/null
    - |
      CREDS=$(aws sts assume-role-with-web-identity \
        --role-arn "$AWS_ROLE_ARN" \
        --role-session-name "gitlab-terraform-${CI_PIPELINE_ID}" \
        --web-identity-token "$GITLAB_OIDC_TOKEN" \
        --duration-seconds 3600 \
        --query Credentials \
        --output json)
      export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r .AccessKeyId)
      export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r .SecretAccessKey)
      export AWS_SESSION_TOKEN=$(echo $CREDS | jq -r .SessionToken)
    - aws sts get-caller-identity
    - terraform init -input=false -reconfigure

# ── validate ────────────────────────────────────────────────────────────────
validate:
  stage: validate
  <<: *aws_oidc
  script:
    - terraform validate
    - terraform fmt -check -recursive
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── plan ────────────────────────────────────────────────────────────────────
plan:
  stage: plan
  <<: *aws_oidc
  script:
    - aws s3 cp s3://bookgate-tf-state-dev-392423995152/dev/terraform.tfstate /tmp/state.json
    - python3 -c "import json; d=json.load(open('/tmp/state.json')); print('resources in S3 state:', len(d.get('resources',[])))"
    - terraform state pull | python3 -c "import sys,json; d=json.loads(sys.stdin.read() or '{}'); print('resources via tf pull:', len(d.get('resources',[])))"
    - terraform plan -input=false -out=tfplan
  artifacts:
    paths:
      - tfplan
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── apply ────────────────────────────────────────────────────────────────────
apply:
  stage: apply
  <<: *aws_oidc
  script:
    - terraform apply -input=false tfplan
  dependencies:
    - plan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
