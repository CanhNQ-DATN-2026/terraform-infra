# .gitlab-ci.yml — Terraform CI/CD pipeline
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   AWS_ROLE_ARN  — IAM role to assume via OIDC (e.g. arn:aws:iam::ACCOUNT:role/bookgate-terraform-role)
#   AWS_REGION    — AWS region (e.g. us-east-1)
#
# All Terraform variables are sourced from terraform.tfvars (committed, no secrets).
# RDS password is managed by AWS Secrets Manager — no password var needed.
#
# Pipeline stages:
#   test  — validate + security scan run in parallel (no AWS credentials needed)
#   plan  — terraform plan (requires AWS)
#   apply — terraform apply, manual trigger on main only

stages:
  - test
  - plan
  - apply

default:
  tags:
    - terraform-runner
  # Xóa container + image sau mỗi job để tránh tích tụ disk
  after_script:
    - docker image prune -f 2>/dev/null || true

# ── OIDC auth helper (jobs that need AWS) ───────────────────────────────────
.aws_oidc: &aws_oidc
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - |
      export AWS_REGION="${AWS_REGION}"
      export AWS_DEFAULT_REGION="${AWS_REGION}"
      export AWS_ROLE_ARN="${AWS_ROLE_ARN}"
      export AWS_STS_REGIONAL_ENDPOINTS=regional
      export AWS_WEB_IDENTITY_TOKEN_FILE="${CI_PROJECT_DIR}/.gitlab_oidc_token"
      printf '%s' "$GITLAB_OIDC_TOKEN" > "$AWS_WEB_IDENTITY_TOKEN_FILE"
    - terraform init -input=false -reconfigure

# ── validate ─────────────────────────────────────────────────────────────────
# No AWS credentials needed — init with -backend=false for syntax check only.
validate:
  stage: test
  image:
    name: hashicorp/terraform:1.9
    entrypoint: [""]
  allow_failure: true
  script:
    - terraform init -backend=false -input=false
    - terraform validate
    - terraform fmt -check -recursive
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── security scan (Checkov) ──────────────────────────────────────────────────
# Static analysis — no AWS credentials needed.
# Checks: encryption at rest, public access, logging, IAM least privilege, etc.
# allow_failure: true — findings are reported but don't block plan/apply.
# Change to false to enforce hard policy gates.
security:
  stage: test
  image:
    name: ghcr.io/bridgecrewio/checkov:3.2.0-slim
    entrypoint: [""]
  allow_failure: true
  script:
    - checkov
        --directory .
        --framework terraform
        --output cli
        --output junitxml
        --output-file-path console,checkov-report.xml
        --compact
        --skip-check CKV_AWS_7,CKV2_AWS_62
  artifacts:
    when: always
    reports:
      junit: checkov-report.xml
    expire_in: 7 days
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── plan ─────────────────────────────────────────────────────────────────────
plan:
  stage: plan
  needs:
    - job: validate
      optional: true
    - job: security
      optional: true
  <<: *aws_oidc
  script:
    - terraform plan -input=false -out=tfplan
  artifacts:
    paths:
      - tfplan
    expire_in: 1 day
  rules:
    # MR: plan runs but artifact không dùng để apply (apply bị block)
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── apply ─────────────────────────────────────────────────────────────────────
# Chỉ chạy trên main branch, manual. Không bao giờ chạy trên MR.
apply:
  stage: apply
  <<: *aws_oidc
  script:
    - terraform apply -input=false tfplan
  dependencies:
    - plan
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
