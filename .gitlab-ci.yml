# .gitlab-ci.yml — Terraform CI/CD pipeline
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   AWS_ROLE_ARN              — IAM role to assume via OIDC (e.g. arn:aws:iam::ACCOUNT:role/bookgate-terraform-role)
#   AWS_REGION                — AWS region (e.g. us-east-1)
#   TF_VAR_s3_bucket_suffix   — AWS account ID for unique S3 bucket naming
#
# RDS password is managed by AWS Secrets Manager (manage_master_user_password = true) — no password var needed.
# All other variables have defaults in variables.tf and can be overridden the same way.

stages:
  - validate
  - plan
  - apply

default:
  image: hashicorp/terraform:1.9
  tags:
    - terraform

# ── OIDC auth helper ────────────────────────────────────────────────────────
.aws_oidc: &aws_oidc
  id_tokens:
    GITLAB_OIDC_TOKEN:
      aud: https://gitlab.com
  before_script:
    - apk add --no-cache aws-cli jq > /dev/null
    - |
      CREDS=$(aws sts assume-role-with-web-identity \
        --role-arn "$AWS_ROLE_ARN" \
        --role-session-name "gitlab-terraform-${CI_PIPELINE_ID}" \
        --web-identity-token "$GITLAB_OIDC_TOKEN" \
        --duration-seconds 3600 \
        --query Credentials \
        --output json)
      export AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r .AccessKeyId)
      export AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r .SecretAccessKey)
      export AWS_SESSION_TOKEN=$(echo $CREDS | jq -r .SessionToken)
    - terraform init -input=false

# ── validate ────────────────────────────────────────────────────────────────
validate:
  stage: validate
  <<: *aws_oidc
  script:
    - terraform validate
    - terraform fmt -check -recursive
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── plan ────────────────────────────────────────────────────────────────────
plan:
  stage: plan
  <<: *aws_oidc
  script:
    - terraform plan -input=false -out=tfplan
  artifacts:
    paths:
      - tfplan
    expire_in: 1 day
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ── apply ────────────────────────────────────────────────────────────────────
apply:
  stage: apply
  <<: *aws_oidc
  script:
    - terraform apply -input=false tfplan
  dependencies:
    - plan
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
