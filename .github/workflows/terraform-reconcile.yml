name: Terraform Reconcile

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-reconcile-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TF_VERSION: "1.9.0"
  AWS_REGION: ${{ vars.AWS_REGION }}

jobs:
  reconcile:
    name: Reconcile To Code
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: github-actions-terraform-reconcile

      - name: Terraform Init
        run: terraform init -input=false -reconfigure

      - name: Terraform Plan
        id: plan
        shell: bash
        run: |
          set +e
          terraform plan -input=false -detailed-exitcode -out=tfplan
          exit_code=$?
          set -e

          case "$exit_code" in
            0)
              echo "No actionable changes detected. Live AWS resources already match the code on main." >> "$GITHUB_STEP_SUMMARY"
              ;;
            2)
              echo "Actionable changes detected. Terraform will now apply them to reconcile AWS back to the code on main." >> "$GITHUB_STEP_SUMMARY"
              terraform show -no-color tfplan > reconcile-plan.txt
              ;;
            *)
              echo "Terraform plan failed with exit code $exit_code." >> "$GITHUB_STEP_SUMMARY"
              exit "$exit_code"
              ;;
          esac

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"

      - name: Upload Reconcile Plan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reconcile-plan-report
          path: reconcile-plan.txt
          if-no-files-found: ignore
          retention-days: 7

      - name: Terraform Apply
        if: steps.plan.outputs.exit_code == '2'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Write Summary
        if: steps.plan.outputs.exit_code == '2'
        run: echo "Terraform apply completed to converge live AWS resources back to the code on main." >> "$GITHUB_STEP_SUMMARY"
